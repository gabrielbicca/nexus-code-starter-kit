name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CLI syntax check
        run: node -c bin/cli.js

      - name: Drift guard (orchestrator.md / README.md vs filesystem)
        run: node scripts/check-drift.js

      - name: npm publish dry-run
        run: npm publish --dry-run
