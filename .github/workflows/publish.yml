name: Publish to npm

on:
  push:
    tags:
      - "v*"
  # Disparo manual: faz só dry-run, util pra verificar autenticacao
  # do NPM_TOKEN sem publicar de fato.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: CLI syntax check
        run: node -c bin/cli.js

      - name: Drift guard
        run: node scripts/check-drift.js

      - name: Publish (real on tag, dry-run on manual)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → dry-run para verificar auth"
            npm publish --dry-run --access public
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
